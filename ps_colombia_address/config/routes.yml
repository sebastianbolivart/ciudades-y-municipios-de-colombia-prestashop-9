# ps_colombia_address — Symfony Route Definitions
#
# Admin configuration and dataset management are handled by Symfony controller actions.
# All routes are under module scope and protected by PrestaShop admin security + CSRF checks.

admin_colombia_address_save:
  path: /admin/colombia-address/save
  methods: [POST]
  defaults:
    _controller: 'PsColombiaAddress\Controller\Admin\ColombiaAddressController::saveAction'

admin_colombia_address_municipalities:
  path: /admin/colombia-address/municipalities
  methods: [GET]
  defaults:
    _controller: 'PsColombiaAddress\Controller\Admin\ColombiaAddressController::municipalitiesAction'

admin_colombia_address_import:
  path: /admin/colombia-address/import
  methods: [POST]
  defaults:
    _controller: 'PsColombiaAddress\Controller\Admin\ColombiaAddressController::importAction'
